name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install --upgrade -r requirements.txt

      - name: Run unit tests
        # CI runners never have a real WDGoWars key, so the live-key
        # safety guard is a no-op here. Setting the env var anyway makes
        # the intent explicit in case CI is ever swapped to self-hosted.
        env:
          MUNINN_TEST_ALLOW_LIVE_KEY: "1"
        run: python -m unittest discover -s tests -v

      - name: Lint README examples
        # Catches README code blocks that drift away from the venv-aware
        # invocation pattern (post-v2.0.8). Adds ~1s to CI.
        run: python scripts/check_readme_examples.py README.md

      - name: Smoke (full pre-release sanity)
        # Only on Python 3.12 — running it on every matrix entry would
        # triple CI time for no extra signal (the smoke script itself
        # doesn't care which interpreter, it spawns its own venv).
        if: matrix.python-version == '3.12'
        env:
          MUNINN_TEST_ALLOW_LIVE_KEY: "1"
        run: bash scripts/smoke.sh

      - name: Smoke-test CLI (--version, --help)
        run: |
          python muninn.py --version
          python muninn.py --help | head -5

      - name: Smoke-test detect_format on shipped examples
        run: |
          for f in examples/*; do
            if [ -f "$f" ]; then
              python -c "from pathlib import Path; from muninn import detect_format; print(f'$f -> {detect_format(Path(\"$f\"))}')"
            fi
          done
