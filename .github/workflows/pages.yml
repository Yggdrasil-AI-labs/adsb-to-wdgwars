name: Deploy web frontend to Pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "muninn.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

# GitHub deprecated Node 20 actions; force the runner to use Node 24 so
# our v4/v5 action pins keep working past the September 2026 cutoff
# without us having to chase every minor action release.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Always ship the latest root muninn.py into web/. The web bundle's copy
      # is regenerated here so a release-tagged commit gets the right parser.
      - name: Sync muninn.py into web/
        run: cp muninn.py web/muninn.py

      # Stamp a per-deploy cache-bust onto the app.js URL in index.html.
      # Users with a cached old app.js will fetch fresh on the next visit
      # any time the parser version or build SHA changes.
      - name: Cache-bust web/app.js URL in index.html
        run: |
          VER=$(grep -oP '__version__ = "\K[^"]+' muninn.py)
          SHA=$(git rev-parse --short HEAD)
          STAMP="${VER}-${SHA}"
          sed -i "s|app.js?v=[^\"]*|app.js?v=${STAMP}|" web/index.html
          echo "Stamped app.js?v=${STAMP}"

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
