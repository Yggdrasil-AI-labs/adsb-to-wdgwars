<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="sky" cx="50%" cy="38%" r="78%">
      <stop offset="0%" stop-color="#1d2746"/>
      <stop offset="55%" stop-color="#0a0e1c"/>
      <stop offset="100%" stop-color="#02030a"/>
    </radialGradient>
    <linearGradient id="raven" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#0c0c12"/>
      <stop offset="100%" stop-color="#1c1d26"/>
    </linearGradient>
    <radialGradient id="eyeglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffcf7a"/>
      <stop offset="55%" stop-color="#c46a1a"/>
      <stop offset="100%" stop-color="#3a1604" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" fill="url(#sky)"/>

  <!-- starfield -->
  <g fill="#9badd0">
    <circle cx="78"  cy="62"  r="1.2" opacity="0.7"/>
    <circle cx="432" cy="88"  r="1.6" opacity="0.8"/>
    <circle cx="118" cy="438" r="1.1" opacity="0.55"/>
    <circle cx="452" cy="382" r="1.0" opacity="0.65"/>
    <circle cx="382" cy="48"  r="0.9" opacity="0.5"/>
    <circle cx="58"  cy="298" r="1.0" opacity="0.55"/>
    <circle cx="180" cy="70"  r="0.8" opacity="0.5"/>
    <circle cx="330" cy="450" r="1.0" opacity="0.6"/>
  </g>

  <!-- faint rune ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#3a4a78" stroke-width="0.6" opacity="0.25"/>
  <circle cx="256" cy="256" r="218" fill="none" stroke="#3a4a78" stroke-width="0.4" opacity="0.18"/>

  <!-- raven, wings spread, viewed from above -->
  <g fill="url(#raven)" stroke="#000" stroke-width="0.5">
    <!-- left wing -->
    <path d="M 256 244
             Q 196 200, 124 178
             Q 60 172, 22 198
             Q 50 210, 96 218
             Q 150 226, 198 240
             Q 226 250, 252 262 Z"/>
    <!-- left wing feather tips -->
    <path d="M 30 198 L 14 214 L 36 212 Z"/>
    <path d="M 70 208 L 56 226 L 78 222 Z"/>
    <path d="M 110 216 L 98 234 L 120 228 Z"/>

    <!-- right wing -->
    <path d="M 256 244
             Q 316 200, 388 178
             Q 452 172, 490 198
             Q 462 210, 416 218
             Q 362 226, 314 240
             Q 286 250, 260 262 Z"/>
    <!-- right wing feather tips -->
    <path d="M 482 198 L 498 214 L 476 212 Z"/>
    <path d="M 442 208 L 456 226 L 434 222 Z"/>
    <path d="M 402 216 L 414 234 L 392 228 Z"/>

    <!-- body -->
    <ellipse cx="256" cy="264" rx="26" ry="62"/>

    <!-- head -->
    <ellipse cx="256" cy="200" rx="22" ry="24"/>

    <!-- beak -->
    <path d="M 256 178 L 248 156 L 264 156 Z"/>
    <path d="M 252 162 L 260 162 L 256 168 Z" fill="#000"/>

    <!-- tail (fanned) -->
    <path d="M 232 318
             L 250 364
             L 256 372
             L 262 364
             L 280 318
             L 268 320
             L 256 326
             L 244 320 Z"/>
  </g>

  <!-- eyes -->
  <circle cx="248" cy="198" r="6" fill="url(#eyeglow)"/>
  <circle cx="264" cy="198" r="6" fill="url(#eyeglow)"/>
  <circle cx="248" cy="198" r="1.8" fill="#fff5d4"/>
  <circle cx="264" cy="198" r="1.8" fill="#fff5d4"/>
</svg>
