<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="sky" cx="50%" cy="38%" r="78%">
      <stop offset="0%" stop-color="#1d2746"/>
      <stop offset="55%" stop-color="#0a0e1c"/>
      <stop offset="100%" stop-color="#02030a"/>
    </radialGradient>
    <linearGradient id="raven" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#0a0a10"/>
      <stop offset="100%" stop-color="#1e202a"/>
    </linearGradient>
    <radialGradient id="eyeglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffdf95"/>
      <stop offset="50%" stop-color="#d27a1c"/>
      <stop offset="100%" stop-color="#3a1604" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moon" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#3a4a78" stop-opacity="0.25"/>
      <stop offset="70%" stop-color="#1a2342" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0a0e1c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" fill="url(#sky)"/>

  <!-- subtle moon halo behind raven -->
  <circle cx="280" cy="220" r="180" fill="url(#moon)"/>

  <!-- starfield -->
  <g fill="#9badd0">
    <circle cx="78"  cy="62"  r="1.2" opacity="0.7"/>
    <circle cx="432" cy="88"  r="1.6" opacity="0.8"/>
    <circle cx="118" cy="438" r="1.1" opacity="0.55"/>
    <circle cx="452" cy="382" r="1.0" opacity="0.65"/>
    <circle cx="382" cy="48"  r="0.9" opacity="0.5"/>
    <circle cx="58"  cy="298" r="1.0" opacity="0.55"/>
    <circle cx="180" cy="70"  r="0.8" opacity="0.5"/>
    <circle cx="330" cy="450" r="1.0" opacity="0.6"/>
    <circle cx="64"  cy="160" r="0.9" opacity="0.5"/>
    <circle cx="240" cy="40"  r="1.1" opacity="0.6"/>
  </g>

  <!-- perched raven, profile, facing left -->
  <g fill="url(#raven)" stroke="#000" stroke-width="0.6" stroke-linejoin="round">
    <!-- body + head + beak + tail traced as one silhouette -->
    <path d="
      M 110 252
      C 118 232, 138 215, 168 213
      C 188 212, 205 220, 215 232
      L 244 224
      L 256 232
      L 232 248
      C 238 256, 242 266, 244 280
      C 245 296, 244 314, 246 332
      C 252 340, 262 348, 276 354
      L 396 384
      L 412 392
      L 408 400
      L 392 400
      L 280 376
      C 284 392, 280 408, 268 416
      C 268 432, 270 446, 272 456
      L 256 456
      L 252 432
      L 244 432
      L 240 456
      L 224 456
      L 222 426
      C 208 420, 196 408, 190 392
      C 184 372, 184 348, 188 320
      C 188 296, 180 274, 168 264
      C 152 260, 134 258, 120 258
      C 116 256, 112 254, 110 252
      Z
    "/>

    <!-- folded wing overlay (slightly darker, gives depth) -->
    <path d="
      M 196 248
      C 220 246, 244 256, 256 280
      C 262 310, 262 348, 248 370
      C 232 374, 212 372, 200 360
      C 188 332, 188 294, 196 248
      Z
    " fill="#070710" opacity="0.55"/>

    <!-- wing feather curves -->
    <path d="M 210 270 C 232 280, 246 308, 244 340" fill="none" stroke="#000" stroke-width="0.8" opacity="0.4"/>
    <path d="M 204 296 C 226 308, 240 332, 240 358" fill="none" stroke="#000" stroke-width="0.8" opacity="0.35"/>
    <path d="M 200 322 C 220 332, 234 346, 236 364" fill="none" stroke="#000" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- single visible eye, glowing -->
  <circle cx="172" cy="226" r="9" fill="url(#eyeglow)"/>
  <circle cx="172" cy="226" r="2.6" fill="#fff5d4"/>

  <!-- subtle perch line -->
  <line x1="180" y1="456" x2="300" y2="456" stroke="#2a324a" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
</svg>
