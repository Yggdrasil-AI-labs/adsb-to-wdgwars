        C 118 232, 138 215, 168 213
        C 188 212, 205 220, 215 232
        L 244 224
        L 256 232
        L 232 248
        C 238 256, 242 266, 244 280
        C 245 296, 244 314, 246 332
        C 252 340, 262 348, 276 354
        L 396 384
        L 412 392
        L 408 400
        L 392 400
        L 280 376
        C 284 392, 280 408, 268 416
        C 268 432, 270 446, 272 456
        L 256 456
        L 252 432
        L 244 432
        L 240 456
        L 224 456
        L 222 426
        C 208 420, 196 408, 190 392
        C 184 372, 184 348, 188 320
        C 188 296, 180 274, 168 264
        C 152 260, 134 258, 120 258
        C 116 256, 112 254, 110 252
        Z
      "/>
      <path d="
        M 196 248
        C 220 246, 244 256, 256 280
        C 262 310, 262 348, 248 370
        C 232 374, 212 372, 200 360
        C 188 332, 188 294, 196 248
        Z
      " fill="#070710" opacity="0.55"/>
      <path d="M 210 270 C 232 280, 246 308, 244 340" fill="none" stroke="#000" stroke-width="0.8" opacity="0.4"/>
      <path d="M 204 296 C 226 308, 240 332, 240 358" fill="none" stroke="#000" stroke-width="0.8" opacity="0.35"/>
      <path d="M 200 322 C 220 332, 234 346, 236 364" fill="none" stroke="#000" stroke-width="0.8" opacity="0.3"/>
