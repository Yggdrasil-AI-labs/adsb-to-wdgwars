    <circle cx="172" cy="226" r="9" fill="url(#eyeglow2)"/>
    <circle cx="172" cy="226" r="2.6" fill="#fff5d4"/>
    <line x1="180" y1="456" x2="320" y2="456" stroke="#2a324a" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  </g>

  <!-- title block -->
  <g transform="translate(580, 0)">
    <text x="0" y="280"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="140"
          font-weight="700"
          letter-spacing="6"
          fill="url(#title)">MUNINN</text>

    <line x1="6" y1="318" x2="540" y2="318" stroke="#6b5530" stroke-width="1.2" opacity="0.7"/>

    <text x="8" y="370"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="26"
          font-style="italic"
          fill="#c9bda0"
          letter-spacing="1.5">Odin's memory-raven for the WDGoWars sky.</text>

    <text x="8" y="430"
          font-family="'Courier New', monospace"
          font-size="20"
          fill="#7b8aa8"
          letter-spacing="1">ADS-B captures → WDGoWars, in one command.</text>
  </g>
