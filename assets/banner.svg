  </defs>

  <rect width="1280" height="640" fill="url(#sky2)"/>

  <!-- moon halo behind raven -->
  <circle cx="280" cy="300" r="240" fill="url(#moon2)"/>

  <!-- starfield -->
  <g fill="#9badd0">
