    <circle cx="60"   cy="380" r="1.0" opacity="0.55"/>
    <circle cx="600"  cy="40"  r="0.8" opacity="0.5"/>
    <circle cx="780"  cy="580" r="1.0" opacity="0.6"/>
    <circle cx="430"  cy="120" r="0.9" opacity="0.45"/>
    <circle cx="1240" cy="320" r="1.0" opacity="0.55"/>
  </g>

  <!-- perched raven on left, scaled up -->
  <g transform="translate(20, 60) scale(1.05)">
    <g fill="url(#raven2)" stroke="#000" stroke-width="0.6" stroke-linejoin="round">
      <path d="
